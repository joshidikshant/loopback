name: CI

on:
  push:
    branches: [main]
  pull_request:

# No untrusted event data is interpolated into run commands anywhere below.
jobs:
  build-smoke-init:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm run smoke
      - run: node scripts/init-gate.mjs
      - run: node scripts/registry-gate.mjs

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: node scripts/e2e.mjs
